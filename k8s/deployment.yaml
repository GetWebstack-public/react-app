apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-infra-front
  labels:
    app: test-infra-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-infra-front
  template:
    metadata:
      labels:
        app: test-infra-front
    spec:
      containers:
      - name: frontend
        image: test-infra-front:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: API_URL
          value: "https://test-infra-api.test-project-infra.local.getwebstack.dev:9443"
        resources:
          requests``:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: test-infra-front
  labels:
    app: test-infra-front
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: test-infra-front
